<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DSA Tracker </title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<div class="max-w-7xl mx-auto p-6">

  <h1 class="text-3xl font-bold mb-4">🚀 DSA Tracker (Striver Style)</h1>

  <!-- Upload -->
  <div class="mb-4">
    <input type="file" id="csvFiles" multiple accept=".csv"
      class="p-2 border rounded bg-white"/>
  </div>

  <!-- Filters -->
  <div class="flex flex-wrap gap-4 mb-4">

    <input id="search" placeholder="Search questions..."
      class="p-2 border rounded w-60"/>
<button onclick="clearData()" 
  class="mb-4 bg-red-500 text-white px-4 py-2 rounded">
  Reset Sheet
</button>
    <select id="companyFilter" class="p-2 border rounded">
      <option value="">All Companies</option>
    </select>

    <select id="difficultyFilter" class="p-2 border rounded">
      <option value="">All Difficulty</option>
      <option value="EASY">Easy</option>
      <option value="MEDIUM">Medium</option>
      <option value="HARD">Hard</option>
    </select>

  </div>

  <!-- Progress -->
  <div class="mb-4">
    <p id="progressText" class="font-semibold"></p>
    <div class="w-full bg-gray-300 rounded h-4">
      <div id="progressBar" class="bg-green-500 h-4 rounded"></div>
    </div>
  </div>

  <!-- Table -->
  <div class="overflow-auto bg-white rounded shadow">
    <table class="w-full text-sm">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2">✔</th>
          <th class="p-2">Title</th>
          <th class="p-2">Company</th>
          <th class="p-2">Difficulty</th>
          <th class="p-2">Link</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>
let data = [];
let filteredData = [];

// 🔥 unified progress store
let progress = JSON.parse(localStorage.getItem("progress")) || {};

const tableBody = document.getElementById("tableBody");
const searchInput = document.getElementById("search");
const companyFilter = document.getElementById("companyFilter");
const difficultyFilter = document.getElementById("difficultyFilter");

// ================= LOAD FROM STORAGE =================
window.onload = function () {
  const savedData = localStorage.getItem("dsaData");

  if (savedData) {
    data = JSON.parse(savedData);
    updateCompanyFilter();
    applyFilters();
  }
};

// ================= CSV PARSER =================
function parseCSV(text, companyName) {
  const rows = text.split("\n").slice(1);

  return rows.map(row => {
    const cols = row.split(",");
    return {
      title: cols[1],
      difficulty: cols[0]?.toUpperCase(),
      link: cols[3],
      company: companyName,
      id: cols[1] + "_" + companyName
    };
  }).filter(r => r.title);
}

// ================= UPLOAD =================
document.getElementById("csvFiles").addEventListener("change", function(e) {
  const files = e.target.files;

  Array.from(files).forEach(file => {
    const reader = new FileReader();

    reader.onload = function(evt) {
      const parsed = parseCSV(evt.target.result, file.name.replace(".csv", ""));

      // 🔥 prevent duplicates
      const existingIds = new Set(data.map(d => d.id));
      const newData = parsed.filter(item => !existingIds.has(item.id));

      data.push(...newData);

      // 🔥 SAVE DATA
      localStorage.setItem("dsaData", JSON.stringify(data));

      updateCompanyFilter();
      applyFilters();
    };

    reader.readAsText(file);
  });
});

// ================= FILTERS =================
function applyFilters() {
  const search = searchInput.value.toLowerCase();
  const company = companyFilter.value;
  const difficulty = difficultyFilter.value;

  filteredData = data.filter(item => {
    return (
      item.title.toLowerCase().includes(search) &&
      (company === "" || item.company === company) &&
      (difficulty === "" || item.difficulty === difficulty)
    );
  });

  renderTable();
  updateProgress();
}

searchInput.addEventListener("input", applyFilters);
companyFilter.addEventListener("change", applyFilters);
difficultyFilter.addEventListener("change", applyFilters);

// ================= RENDER =================
function renderTable() {
  tableBody.innerHTML = "";

  filteredData.forEach(item => {
    const solved = progress[item.id] === true;

    const row = `
      <tr class="border-b">
        <td class="p-2 text-center">
          <input type="checkbox" ${solved ? "checked" : ""}
            onchange="toggleSolved('${item.id}')"/>
        </td>
        <td class="p-2">${item.title}</td>
        <td class="p-2">${item.company}</td>
        <td class="p-2">
          <span class="px-2 py-1 rounded text-white ${
            item.difficulty === "EASY" ? "bg-green-500" :
            item.difficulty === "MEDIUM" ? "bg-yellow-500" :
            "bg-red-500"
          }">${item.difficulty}</span>
        </td>
        <td class="p-2">
          <a href="${item.link}" target="_blank"
            class="text-blue-600 underline">Solve</a>
        </td>
      </tr>
    `;

    tableBody.innerHTML += row;
  });
}

// ================= TOGGLE =================
function toggleSolved(id) {
  progress[id] = !progress[id];

  // 🔥 SAVE PROGRESS
  localStorage.setItem("progress", JSON.stringify(progress));

  updateProgress();
}

// ================= PROGRESS =================
function updateProgress() {
  const total = filteredData.length;

  const solved = filteredData.filter(item =>
    progress[item.id] === true
  ).length;

  const percent = total ? (solved / total) * 100 : 0;

  document.getElementById("progressText").innerText =
    `Solved ${solved} / ${total}`;

  document.getElementById("progressBar").style.width = percent + "%";
}

// ================= COMPANY FILTER =================
function updateCompanyFilter() {
  const companies = [...new Set(data.map(d => d.company))];

  companyFilter.innerHTML = `<option value="">All Companies</option>`;

  companies.forEach(c => {
    companyFilter.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

// ================= RESET =================
function clearData() {
  if (confirm("This will delete all data & progress. Continue?")) {
    localStorage.removeItem("dsaData");
    localStorage.removeItem("progress");
    location.reload();
  }
}
</script>
</body>
</html>
